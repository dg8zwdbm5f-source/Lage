<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    
    <style>
        /* --- Configurações Globais --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            padding-bottom: 40px;
        }

        header {
            background-color: #1a1a1e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #29292e;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #ffffff;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        #status-conexao {
            padding: 15px;
            font-weight: bold;
            text-align: center;
            background: #202024;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #29292e;
        }

        /* --- Layout dos Cartões (Resumo) --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: #1a1a1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #29292e;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            font-size: 0.9rem;
            color: #8d8d99;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card h2 {
            font-size: 1.6rem;
            color: #ffffff;
        }

        /* Cores dos Indicadores dos Cartões */
        .cards .card:nth-child(1) h2 { color: #ffb800; } /* Total Gasto */
        .cards .card:nth-child(2) h2 { color: #633bbc; } /* Quantidade */
        .cards .card:nth-child(3) h2 { color: #00b37e; } /* Pago */
        .cards .card:nth-child(4) h2 { color: #f75a68; } /* Pendente */

        /* --- Layout dos Gráficos --- */
        .container-graficos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .bloco-grafico {
            background-color: #1a1a1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #29292e;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            min-height: 340px;
            display: flex;
            flex-direction: column;
        }

        .bloco-grafico h3 {
            font-size: 0.95rem;
            color: #c4c4cc;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .canvas-container {
            position: relative;
            flex-grow: 1;
            height: 100%;
            width: 100%;
        }

        /* --- Tabela de Lançamentos --- */
        .container-tabela {
            background-color: #1a1a1e;
            border-radius: 8px;
            border: 1px solid #29292e;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 20px;
            border-bottom: 1px solid #29292e;
            font-size: 0.95rem;
        }

        th {
            background-color: #202024;
            color: #c4c4cc;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: #202024;
        }

        td {
            color: #e1e1e6;
        }

        /* --- Badges de Status --- */
        .status-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-badge.pago {
            background-color: rgba(0, 179, 126, 0.1);
            color: #00b37e;
            border: 1px solid #00b37e;
        }

        .status-badge.pendente {
            background-color: rgba(247, 90, 104, 0.1);
            color: #f75a68;
            border: 1px solid #f75a68;
        }
    </style>
</head>
<body>

    <header>
        <h1>💰 Dashboard Financeiro</h1>
    </header>

    <main>
        <div id="status-conexao">Carregando dados da planilha...</div>

        <section class="cards">
            <div class="card">
                <h3>Total Gasto</h3>
                <h2 id="totalGasto">R$ 0,00</h2>
            </div>
            <div class="card">
                <h3>Lançamentos</h3>
                <h2 id="qtdeLancamentos">0</h2>
            </div>
            <div class="card">
                <h3>Pago</h3>
                <h2 id="totalPago">R$ 0,00</h2>
            </div>
            <div class="card">
                <h3>Pendente</h3>
                <h2 id="totalPendente">R$ 0,00</h2>
            </div>
        </section>

        <section class="container-graficos">
            <div class="bloco-grafico">
                <h3>Gastos por Subcategoria</h3>
                <div class="canvas-container">
                    <canvas id="graficoSubcategorias"></canvas>
                </div>
            </div>
            <div class="bloco-grafico">
                <h3>Gastos por Centro de Custo</h3>
                <div class="canvas-container">
                    <canvas id="graficoCentroCusto"></canvas>
                </div>
            </div>
        </section>

        <section class="container-tabela">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Fornecedor</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Conta</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo"></tbody>
            </table>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/graficos.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/financeiro.js"></script>
</body>
</html>
