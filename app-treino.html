<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>V-Shape · Alex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap');
:root{
  --bg:#0f0f0f;--s1:#171717;--s2:#1f1f1f;--s3:#272727;
  --border:#2c2c2c;--gold:#c9a84c;--gold2:#e8c96a;
  --gdim:rgba(201,168,76,.12);--text:#f0f0f0;--muted:#888;--dim:#444;
  --green:#5ebd7a;--red:#e05555;--blue:#5b9bd5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;background:var(--bg);}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:-2px;}
.hdr-nav{display:flex;gap:6px;}
.nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.nav-btn:hover,.nav-btn.active{background:var(--gdim);border-color:var(--gold);color:var(--gold);}

/* ── WEEK STRIP ── */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--s1);}
.dc{padding:9px 4px;text-align:center;cursor:pointer;transition:background .15s;border-right:1px solid var(--border);}
.dc:last-child{border-right:none;}
.dc:hover{background:var(--s2);}
.dc.active{background:var(--gdim);}
.dc .dow{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.dc .lbl{font-size:11px;font-weight:700;margin-top:3px;color:var(--text);}
.dc.active .lbl{color:var(--gold);}
.dc .pip{width:5px;height:5px;border-radius:50%;margin:4px auto 0;background:var(--dim);}
.dc.treino .pip{background:var(--gold);}
.dc.cardio .pip{background:var(--green);}
.dc.done .pip{background:var(--green) !important;}

/* ── SCREENS ── */
.screen{display:none;max-width:600px;margin:0 auto;padding:16px 14px 80px;}
.screen.active{display:block;}

/* ── DAY HEADER ── */
.day-hdr{margin-bottom:16px;}
.day-hdr h2{font-size:16px;font-weight:700;}
.day-hdr p{font-size:12px;color:var(--muted);margin-top:2px;}
.day-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}

/* ── BLOCK ── */
.blk{margin-bottom:20px;}
.blk-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:0;}

/* ── EXERCISE ROW ── */
.ex-row{border-bottom:1px solid #1d1d1d;padding:10px 0;}
.ex-row:last-child{border-bottom:none;}
.ex-top{display:flex;align-items:center;gap:10px;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:600;color:var(--text);}
.ex-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.ex-sets-lbl{font-size:11px;color:var(--muted);}
.focus-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--gdim);color:var(--gold);letter-spacing:.3px;}
.ex-actions{display:flex;gap:6px;flex-shrink:0;}
.yt-btn{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:5px 8px;font-size:11px;font-weight:600;text-decoration:none;transition:all .15s;font-family:'Inter',sans-serif;}
.yt-btn:hover{border-color:#e05555;color:#e05555;}
.log-btn{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.log-btn:hover{border-color:var(--gold);color:var(--gold);}
.log-btn.has-log{border-color:var(--green);color:var(--green);}

/* ── LOG PANEL ── */
.log-panel{overflow:hidden;max-height:0;transition:max-height .25s ease;}
.log-panel.open{max-height:400px;}
.log-inner{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px;}
.log-last{font-size:11px;color:var(--muted);margin-bottom:8px;}
.log-last strong{color:var(--green);}
.log-inputs{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:end;}
.log-field{display:flex;flex-direction:column;gap:3px;}
.log-field label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;}
.log-field input{background:var(--s3);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;width:100%;outline:none;}
.log-field input:focus{border-color:var(--gold);}
.save-btn{background:var(--gold);border:none;color:#000;border-radius:5px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;height:34px;}
.save-btn:hover{background:var(--gold2);}

/* ── FINISH SESSION ── */
.finish-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;padding:12px 16px;background:var(--s1);border-top:1px solid var(--border);display:block;}
.finish-btn{max-width:568px;margin:0 auto;width:100%;background:var(--gold);border:none;color:#000;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.5px;text-align:center;}
.finish-btn:hover{background:var(--gold2);}

/* ── REST/CARDIO CARDS ── */
.rest-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;}
.rest-card .icon{font-size:28px;margin-bottom:8px;}
.rest-card h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.rest-card p{font-size:12px;color:var(--muted);line-height:1.7;}
.rest-card.green{border-color:rgba(94,189,122,.3);}
.rest-card.green h3{color:var(--green);}

/* ── HISTÓRICO SCREEN ── */
.hist-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.sess-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.sess-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.sess-hdr:hover{background:var(--s2);}
.sess-title{font-size:13px;font-weight:700;color:var(--text);}
.sess-date{font-size:11px;color:var(--muted);}
.sess-badge{font-size:10px;font-weight:700;background:var(--gdim);color:var(--gold);padding:2px 8px;border-radius:20px;}
.sess-body{display:none;padding:0 14px 12px;}
.sess-body.open{display:block;}
.sess-ex{padding:6px 0;border-bottom:1px solid #1d1d1d;display:flex;justify-content:space-between;align-items:center;}
.sess-ex:last-child{border-bottom:none;}
.sess-ex-name{font-size:12px;color:var(--text);}
.sess-ex-val{font-size:12px;color:var(--green);font-weight:600;}
.del-sess{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 6px;font-family:'Inter',sans-serif;}
.del-sess:hover{text-decoration:underline;}

/* ── EVOLUÇÃO SCREEN ── */
.evo-select-wrap{margin-bottom:16px;}
.evo-select-wrap select{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border
